# devsecops-zero-trust-pipeline/jenkins/casc.yaml
# Configuration automatique de Jenkins au démarrage
 
jenkins:
  systemMessage: 'Pipeline Zero Trust — Jenkins + Claude + Ollama'
  numExecutors: 2
  
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: 'admin'
          password: '${JENKINS_ADMIN_PASSWORD}'
 
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
 
credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: 'ANTHROPIC_API_KEY'
              description: 'Cle API Anthropic Claude'
              secret: '${ANTHROPIC_API_KEY}'


