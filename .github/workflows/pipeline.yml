name: Zero Trust CI/CD Pipeline

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: zerotrust-app

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : SAST — Semgrep
  # ─────────────────────────────────────────
  sast-scan:
    name: "1. SAST — Semgrep"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Semgrep
        run: pip install semgrep

      - name: Lancer le scan
        run: |
          semgrep --config=auto test-app/ \
            --json --output=semgrep-results.json \
            --severity=WARNING || true

      - name: Resume
        run: |
          python3 -c "
          import json
          try:
            d = json.load(open('semgrep-results.json'))
            r = d.get('results', [])
            print(f'Semgrep : {len(r)} probleme(s)')
          except: print('Rapport vide')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-results.json

  # ─────────────────────────────────────────
  # JOB 2 : SCA — Trivy
  # ─────────────────────────────────────────
  dependency-scan:
    name: "2. SCA — Trivy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scanner les dependances
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './test-app'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'MEDIUM,HIGH,CRITICAL'

      - name: Resume
        run: |
          python3 -c "
          import json
          try:
            d = json.load(open('trivy-report.json'))
            total    = sum(len(r.get('Vulnerabilities') or []) for r in d.get('Results', []))
            critical = sum(1 for r in d.get('Results', []) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='CRITICAL')
            high     = sum(1 for r in d.get('Results', []) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='HIGH')
            print(f'Trivy : {total} CVE  {critical} CRITICAL  {high} HIGH')
          except: print('Rapport vide')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  # ─────────────────────────────────────────
  # JOB 3 : Agent IA adaptatif
  #   ANTHROPIC_API_KEY present  -> API Anthropic
  #   pas de cle                 -> Ollama local
  # ─────────────────────────────────────────
  ai-security-guard:
    name: "3. AI Security Guard"
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Telecharger rapport Trivy
        uses: actions/download-artifact@v4
        with:
          name: trivy-report

      - name: Telecharger rapport Semgrep
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report

      - name: Installer dependances Python
        run: pip install anthropic rich requests pydantic

      - name: Copier rapports dans agent/
        run: |
          cp trivy-report.json    agent/trivy-report.json
          cp semgrep-results.json agent/semgrep-results.json

      # ─────────────────────────────────────
      # CORRECTION PRINCIPALE :
      # On ecrit ollama_client.py directement
      # sans heredoc imbriqué pour eviter les
      # problemes d'indentation et d'echappement.
      # verifier_ollama() retourne True en mode
      # cloud SANS toucher Ollama.
      # ─────────────────────────────────────
      - name: Injecter client IA adaptatif
        run: |
          python3 << 'SCRIPTEOF'
          content = '''import os
import json
import requests
from rich.console import Console

console = Console()

ANTHROPIC_API_KEY = os.environ.get("ANTHROPIC_API_KEY", "")
OLLAMA_URL        = "http://localhost:11434"
DEFAULT_MODEL     = "llama3.2:3b"
CLOUD_MODEL       = "claude-haiku-4-5-20251001"

MODE = "cloud" if ANTHROPIC_API_KEY else "local"


def verifier_ollama() -> bool:
    if MODE == "cloud":
        console.print(f"[blue]Mode CI/CD Anthropic ({CLOUD_MODEL})[/blue]")
        return True
    try:
        resp    = requests.get(f"{OLLAMA_URL}/api/tags", timeout=5)
        modeles = [m["name"] for m in resp.json().get("models", [])]
        trouve  = any(DEFAULT_MODEL.split(":")[0] in m for m in modeles)
        if not trouve:
            console.print(f"[red]Modele {DEFAULT_MODEL} non trouve[/red]")
            return False
        console.print(f"[green]Ollama OK — {DEFAULT_MODEL} pret[/green]")
        return True
    except requests.exceptions.ConnectionError:
        console.print("[red]Ollama non lance — lancer : ollama serve[/red]")
        return False
    except Exception as e:
        console.print(f"[red]Erreur : {e}[/red]")
        return False


def _appeler_anthropic(prompt: str) -> str:
    headers = {
        "x-api-key":         ANTHROPIC_API_KEY,
        "anthropic-version": "2023-06-01",
        "content-type":      "application/json",
    }
    payload = {
        "model":      CLOUD_MODEL,
        "max_tokens": 1024,
        "messages":   [{"role": "user", "content": prompt}],
    }
    try:
        console.print(f"[blue]API Anthropic ({CLOUD_MODEL})...[/blue]")
        resp = requests.post(
            "https://api.anthropic.com/v1/messages",
            headers=headers,
            json=payload,
            timeout=60,
        )
        resp.raise_for_status()
        return resp.json()["content"][0]["text"]
    except requests.exceptions.Timeout:
        console.print("[red]Timeout API Anthropic[/red]")
        return ""
    except Exception as e:
        console.print(f"[red]Erreur Anthropic : {e}[/red]")
        return ""


def _appeler_ollama_local(prompt: str) -> str:
    payload = {
        "model":   DEFAULT_MODEL,
        "prompt":  prompt,
        "stream":  False,
        "options": {"temperature": 0.1, "num_predict": 512, "num_ctx": 2048},
    }
    try:
        console.print(f"[blue]Ollama ({DEFAULT_MODEL})...[/blue]")
        resp = requests.post(
            f"{OLLAMA_URL}/api/generate",
            json=payload,
            timeout=300,
        )
        resp.raise_for_status()
        return resp.json().get("response", "")
    except requests.exceptions.Timeout:
        console.print("[red]Timeout Ollama (300s)[/red]")
        return ""
    except Exception as e:
        console.print(f"[red]Erreur Ollama : {e}[/red]")
        return ""


def appeler_ollama(prompt: str, model: str = None) -> str:
    if MODE == "cloud":
        return _appeler_anthropic(prompt)
    return _appeler_ollama_local(prompt)


def appeler_ollama_json(prompt: str, model: str = None) -> dict:
    reponse = appeler_ollama(prompt, model)
    if not reponse:
        return {}
    texte = reponse.strip()
    if "```json" in texte:
        texte = texte.split("```json")[1].split("```")[0]
    elif "```" in texte:
        texte = texte.split("```")[1].split("```")[0]
    debut = texte.find("{")
    fin   = texte.rfind("}")
    if debut != -1 and fin != -1:
        texte = texte[debut:fin + 1]
    try:
        return json.loads(texte.strip())
    except json.JSONDecodeError as e:
        console.print(f"[yellow]Non-JSON ({e})[/yellow]")
        return {"texte_brut": reponse}
'''
          with open("agent/ollama_client.py", "w") as f:
              f.write(content)
          print("ollama_client.py ecrit avec succes")

          import ast
          with open("agent/ollama_client.py") as f:
              ast.parse(f.read())
          print("Syntaxe Python OK")
          SCRIPTEOF

      # ── Agent 1 : Anti-Tampering ──────────────────
      - name: "Agent 1 — Anti-Tampering"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: agent
        run: python antitamper_agent.py
        continue-on-error: true

      # ── Agent 2 : Remediation CVE ─────────────────
      - name: "Agent 2 — Remediation CVE"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:       ${{ github.repository }}
        working-directory: agent
        run: python remediation_agent.py

      # ── Agent 3 : Rapport explicatif ──────────────
      - name: "Agent 3 — Rapport explicatif"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: agent
        run: python explainer_agent.py
        continue-on-error: true

      - name: Publier rapports IA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-reports
          path: |
            agent/ai-remediation-report.json
            agent/rapport-explicatif.md

      - name: Resume GitHub Actions
        if: always()
        run: |
          echo "## Rapport Agent IA" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json, os
          path = 'agent/ai-remediation-report.json'
          if not os.path.exists(path):
              print('Rapport non genere')
          else:
              d = json.load(open(path))
              print(f'**Resume :** {d.get(\"resume\", \"N/A\")}')
              print(f'**Action urgente :** {d.get(\"action_immediate\", \"N/A\")}')
              print('| CVE | Package | Priorite | Correction |')
              print('|-----|---------|----------|------------|')
              for v in d.get('vulnerabilites', []):
                  print(f'| {v.get(\"cve\",\"\")} | {v.get(\"package\",\"\")} | {v.get(\"priorite\",\"\")} | {v.get(\"correction_requirements\",\"\")} |')
          " >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # JOB 4 : Build Docker
  # ─────────────────────────────────────────
  docker-build:
    name: "4. Build Docker"
    runs-on: ubuntu-latest
    needs: [ai-security-guard]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Sauvegarder image
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} > image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 5 : Scan image Docker
  # ─────────────────────────────────────────
  image-scan:
    name: "5. Scan image Docker"
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger image
        run: docker load < image.tar

      - name: Scanner image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '0'

  # ─────────────────────────────────────────
  # JOB 6 : Signature Cosign (main seulement)
  # ─────────────────────────────────────────
  sign-image:
    name: "6. Signature Cosign"
    runs-on: ubuntu-latest
    needs: [image-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@v3
      - name: Pipeline Zero Trust complet
        run: |
          cosign version
          echo "Pipeline Zero Trust complete — commit ${{ github.sha }}"
