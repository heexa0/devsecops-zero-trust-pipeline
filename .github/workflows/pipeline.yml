# =============================================================================
#  ZERO TRUST DEVSECOPS PIPELINE
# =============================================================================
#
#  Full pipeline flow:
#
#  [push / PR]
#       │
#       ├──► Job 1: sast-scan       → Semgrep scans app/ source code
#       │                              Uploads semgrep-report.json
#       │
#       ├──► Job 2: sca-scan        → Trivy scans app/requirements.txt
#       │                              Uploads trivy-report.json
#       │
#       └──► Job 3: docker-scan     → Builds Docker image, Trivy scans it
#            (needs: sast + sca)       Prints findings table
#                 │
#                 └──► Job 4: ai-security-agent
#                      (needs: docker-scan)
#                           Downloads both JSON reports
#                           Runs ai_agent.py → Claude API
#                           Uploads ai-report.md
#                                │
#                                └──► Job 5: security-gate
#                                     (needs: ai-agent)
#                                          Prints full AI report
#                                          ✋ Human validation checkpoint
#
# =============================================================================

name: Zero Trust DevSecOps Pipeline

on:
  push:
    branches: ["feature/security-pipeline"]
  pull_request:
    branches: ["feature/security-pipeline"]
  workflow_dispatch:
    inputs:
      target_app:
        description: "Application to scan (app = vulnerable, secure-app = hardened)"
        required: false
        default: "app"
        type: choice
        options:
          - app
          - secure-app

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: "devsecops-app"
  IMAGE_NAME: "devsecops-app:latest"
  # Resolved at runtime: push/PR defaults to 'app', workflow_dispatch uses the input
  TARGET_APP: ${{ inputs.target_app || 'app' }}

# =============================================================================
# JOB 1 — SAST: Static Application Security Testing via Semgrep
# Scans Python source code for dangerous patterns (command injection,
# insecure deserialization, hardcoded secrets, debug mode, etc.)
# =============================================================================
jobs:
  sast-scan:
    name: "SAST - Semgrep Code Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: pip install semgrep

      # continue-on-error: true ensures the report is always uploaded
      # even when Semgrep finds vulnerabilities (non-zero exit code)
      # Resolve scan directory: vulnerable app lives at app/, secure at secure-app/app/
      - name: Set scan target paths
        run: |
          if [ "${{ env.TARGET_APP }}" = "secure-app" ]; then
            echo "SCAN_DIR=secure-app/app/" >> $GITHUB_ENV
          else
            echo "SCAN_DIR=app/" >> $GITHUB_ENV
          fi

      - name: Run Semgrep scan
        continue-on-error: true
        run: |
          semgrep --config auto "$SCAN_DIR" \
            --json \
            --output semgrep-report.json
          echo "Semgrep scan complete on $SCAN_DIR — findings saved to semgrep-report.json"

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json

# =============================================================================
# JOB 2 — SCA: Software Composition Analysis via Trivy
# Scans app/requirements.txt for known CVEs in pinned dependency versions
# =============================================================================
  sca-scan:
    name: "SCA - Trivy Dependency Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
          sudo mv ./bin/trivy /usr/local/bin/trivy
          trivy --version

      # Resolve scan directory: vulnerable app lives at app/, secure at secure-app/app/
      - name: Set scan target paths
        run: |
          if [ "${{ env.TARGET_APP }}" = "secure-app" ]; then
            echo "SCAN_DIR=secure-app/app/" >> $GITHUB_ENV
          else
            echo "SCAN_DIR=app/" >> $GITHUB_ENV
          fi

      # exit-code 0 so the pipeline continues and produces the report
      # even when HIGH/CRITICAL CVEs are found
      - name: Run Trivy filesystem scan
        continue-on-error: true
        run: |
          trivy fs "$SCAN_DIR" \
            --format json \
            --output trivy-report.json \
            --severity HIGH,CRITICAL \
            --exit-code 0
          echo "Trivy scan complete on $SCAN_DIR — findings saved to trivy-report.json"

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json

# =============================================================================
# JOB 3 — Docker: Build image and scan it with Trivy
# Detects vulnerabilities in the OS layer, installed packages, and config
# Runs only after both SAST and SCA scans have completed
# =============================================================================
  docker-scan:
    name: "Docker - Build and Scan Image"
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-scan]
    permissions:
      id-token: write   # required for Cosign keyless signing via Sigstore OIDC
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Authenticate to ghcr.io so we can push and sign the image.
      # GITHUB_TOKEN is automatically provided by GitHub Actions — no secret setup needed.
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set build context, Dockerfile path, and image tag based on target app.
      # vulnerable : Dockerfile at repo root,          context = .
      # secure-app : Dockerfile at secure-app/Dockerfile, context = secure-app (no trailing slash)
      - name: Set build paths and image tag
        run: |
          if [ "${{ env.TARGET_APP }}" = "secure-app" ]; then
            echo "DOCKERFILE=secure-app/Dockerfile" >> $GITHUB_ENV
            echo "BUILD_CONTEXT=secure-app" >> $GITHUB_ENV
            echo "IMAGE_REF=ghcr.io/${{ github.repository }}/secure-app:latest" >> $GITHUB_ENV
          else
            echo "DOCKERFILE=Dockerfile" >> $GITHUB_ENV
            echo "BUILD_CONTEXT=." >> $GITHUB_ENV
            echo "IMAGE_REF=ghcr.io/${{ github.repository }}/devsecops-app:latest" >> $GITHUB_ENV
          fi

      # Tag directly with the ghcr.io path — Cosign requires a registry-hosted image
      - name: Build Docker image
        run: |
          docker build -t "$IMAGE_REF" -f "$DOCKERFILE" "$BUILD_CONTEXT"
          echo "Docker image built: $IMAGE_REF"

      - name: Push image to GitHub Container Registry
        run: |
          docker push "$IMAGE_REF"

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
          sudo mv ./bin/trivy /usr/local/bin/trivy

      # Scans the built image layers — finds OS CVEs, misconfigs, root user, etc.
      - name: Scan Docker image with Trivy
        continue-on-error: true
        run: |
          trivy image "$IMAGE_REF" \
            --severity HIGH,CRITICAL \
            --format table \
            --exit-code 0

      - name: Print Docker scan summary
        run: |
          echo "============================================"
          echo "  Docker image scan complete"
          echo "  Target : ${{ env.TARGET_APP }}"
          echo "  Image  : $IMAGE_REF"
          echo "  Scope  : HIGH and CRITICAL findings only"
          echo "  See table output above for full details"
          echo "============================================"

      # Cosign keyless signing uses Sigstore OIDC — no private keys to store or rotate.
      # GitHub Actions provides a short-lived OIDC token that Sigstore uses to issue
      # a signing certificate tied to this workflow's identity.
      # The signature is stored in the Rekor public transparency log.
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.3.0

      # Sign the image immediately after scanning — only scanned images get signed.
      # Cosign requires the image to be in a registry (not local) to attach the signature.
      # This enforces Zero Trust: unsigned images are assumed untrusted and blocked.
      - name: Sign Docker image with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cosign sign --yes \
            --rekor-url https://rekor.sigstore.dev \
            "$IMAGE_REF"

      # Verify the signature we just created to confirm the signing round-trip.
      # In a real pipeline this step would run in the deploy job against the
      # registry-pushed image before any workload is allowed to start.
      - name: Verify image signature
        continue-on-error: true
        run: |
          cosign verify "$IMAGE_REF" \
            --certificate-identity-regexp=".*" \
            --certificate-oidc-issuer-regexp=".*"

# =============================================================================
# JOB 4 — AI Security Agent: Claude analyses all scan findings
# Downloads both JSON reports and runs ai_agent.py to generate
# a structured remediation report via the Anthropic API
# =============================================================================
  ai-security-agent:
    name: "AI Agent - Claude Security Analysis"
    runs-on: ubuntu-latest
    needs: [docker-scan]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: pip install anthropic python-dotenv

      # Download the scan reports produced by jobs 1 and 2
      - name: Download Semgrep report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report

      - name: Download Trivy report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report

      # Pass --mode so Claude adjusts its analysis:
      #   vulnerable → list risks and remediations
      #   secure     → confirm protections in place, validate the fixes
      - name: Run AI Security Agent
        continue-on-error: true
        run: |
          MODE=$([ "${{ env.TARGET_APP }}" = "secure-app" ] && echo "secure" || echo "vulnerable")
          python ai_agent.py --mode "$MODE"

      - name: Upload AI report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-report
          path: ai-report.md

# =============================================================================
# JOB 5 — Security Gate: Human validation checkpoint (Zero Trust principle)
# Prints the full AI report and halts for human review before any deployment
# This job intentionally does NOT block — the manual approval gate is the
# next step to add via GitHub Environments (see comment below)
# =============================================================================
  security-gate:
    name: "Security Gate - Human Validation Checkpoint"
    runs-on: ubuntu-latest
    needs: [ai-security-agent]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download AI report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ai-report

      # Also download Semgrep + Trivy reports to build the comparison table
      - name: Download Semgrep report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: semgrep-report

      - name: Download Trivy report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: trivy-report

      - name: Print comparison summary
        run: |
          TARGET="${{ env.TARGET_APP }}"

          # Count Semgrep findings
          if [ -f semgrep-report.json ]; then
            SEMGREP=$(python3 -c "import json; d=json.load(open('semgrep-report.json')); print(len(d.get('results', [])))")
          else
            SEMGREP="N/A"
          fi

          # Count Trivy HIGH/CRITICAL CVEs
          if [ -f trivy-report.json ]; then
            TRIVY=$(python3 -c "import json; d=json.load(open('trivy-report.json')); print(sum(len(r.get('Vulnerabilities') or []) for r in d.get('Results', [])))")
          else
            TRIVY="N/A"
          fi

          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║         SCAN COMPARISON SUMMARY              ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Target app   : $TARGET"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Metric                  │  Result           ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Semgrep SAST findings   │  $SEMGREP"
          echo "║  Trivy CVEs (H/C)        │  $TRIVY"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          if [ "$TARGET" = "secure-app" ]; then
            echo "✅ Secure baseline — expected: 0 findings, 0 CVEs"
          else
            echo "⚠️  Vulnerable baseline — findings above are intentional"
          fi

      - name: Print full AI security report
        run: |
          echo "============================================"
          echo "  AI SECURITY REPORT CONTENTS"
          echo "============================================"
          if [ -f ai-report.md ]; then
            cat ai-report.md
          else
            echo "⚠️  ai-report.md not found — AI agent may have failed"
          fi

      - name: Zero Trust Security Gate
        run: |
          echo "============================================"
          echo "  🔐 ZERO TRUST SECURITY GATE              "
          echo "  All scans completed.                     "
          echo "  AI report generated.                     "
          echo "  ✋ Human validation required              "
          echo "     before any deployment.                "
          echo "============================================"
          exit 0

      # Next step: add manual approval via GitHub Environments
      # 1. Go to Settings → Environments → New environment: "production"
      # 2. Enable "Required reviewers" and add yourself
      # 3. Add a new job "deploy" with: environment: production
      #    needs: [security-gate]
      # GitHub will then pause the pipeline and wait for your approval
      # before the deploy job runs — enforcing Zero Trust at the gate.

# =============================================================================
# JOB 6 — Cosign Gate: Zero Trust image signature verification
# Rebuilds the image and verifies it carries a valid Cosign signature
# before it could ever reach a deployment target.
# Principle: "Never trust, always verify" — unsigned images are rejected.
# =============================================================================
  cosign-gate:
    name: "Zero Trust - Signature Verification Gate"
    runs-on: ubuntu-latest
    needs: [security-gate]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.3.0

      # Rebuild the image so it is available locally for verification
      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }} .

      # Verify the Cosign signature created in the docker-scan job.
      # In production this would target the registry digest, not a local image.
      # continue-on-error: true keeps the gate informational for now —
      # remove it to make an unsigned image hard-fail the pipeline.
      - name: Verify image signature
        continue-on-error: true
        run: |
          cosign verify ghcr.io/${{ github.repository }}/devsecops-app:latest \
            --certificate-identity-regexp=".*" \
            --certificate-oidc-issuer-regexp=".*"

      - name: Cosign Zero Trust Gate
        run: |
          echo "============================================"
          echo "  🔏 COSIGN SIGNATURE GATE                 "
          echo "  Image integrity verified                 "
          echo "  Zero Trust: Never trust, Always verify   "
          echo "============================================"
