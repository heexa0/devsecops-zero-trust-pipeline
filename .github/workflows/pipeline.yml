name: Zero Trust CI/CD Pipeline

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: zerotrust-app

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : SAST — Semgrep
  # ─────────────────────────────────────────
  sast-scan:
    name: "1. SAST — Semgrep"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Semgrep
        run: pip install semgrep

      - name: Lancer le scan
        run: |
          semgrep --config=auto test-app/ \
            --json --output=semgrep-results.json \
            --severity=WARNING || true

      - name: Resume
        run: |
          python3 -c "
          import json
          try:
            d=json.load(open('semgrep-results.json'))
            print(f'Semgrep : {len(d.get(chr(114)+chr(101)+chr(115)+chr(117)+chr(108)+chr(116)+chr(115),[]))} probleme(s)')
          except: print('Rapport vide')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-results.json

  # ─────────────────────────────────────────
  # JOB 2 : SCA — Trivy
  # ─────────────────────────────────────────
  dependency-scan:
    name: "2. SCA — Trivy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scanner les dependances
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './test-app'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'MEDIUM,HIGH,CRITICAL'

      - name: Resume
        run: |
          python3 -c "
          import json
          try:
            d=json.load(open('trivy-report.json'))
            t=sum(len(r.get('Vulnerabilities') or []) for r in d.get('Results',[]))
            c=sum(1 for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='CRITICAL')
            h=sum(1 for r in d.get('Results',[]) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='HIGH')
            print(f'Trivy : {t} CVE  {c} CRITICAL  {h} HIGH')
          except: print('Rapport vide')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  # ─────────────────────────────────────────
  # JOB 3 : Agent IA
  # ollama_client.py est deja dans le repo (agent/)
  # Il detecte automatiquement le mode :
  #   ANTHROPIC_API_KEY defini -> Anthropic API
  #   pas de cle              -> Ollama local
  # ─────────────────────────────────────────
  ai-security-guard:
    name: "3. AI Security Guard"
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Telecharger rapport Trivy
        uses: actions/download-artifact@v4
        with:
          name: trivy-report

      - name: Telecharger rapport Semgrep
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report

      - name: Installer dependances Python
        run: pip install anthropic rich requests pydantic

      - name: Copier rapports dans agent/
        run: |
          cp trivy-report.json    agent/trivy-report.json
          cp semgrep-results.json agent/semgrep-results.json

      - name: Verifier mode IA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "Mode : API Anthropic (CI/CD)"
          else
            echo "Mode : Ollama local (pas de cle definie)"
          fi

      - name: "Agent 1 — Anti-Tampering"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: agent
        run: python antitamper_agent.py
        continue-on-error: true

      - name: "Agent 2 — Remediation CVE"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        working-directory: agent
        run: python remediation_agent.py

      - name: "Agent 3 — Rapport explicatif"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: agent
        run: python explainer_agent.py
        continue-on-error: true

      - name: Publier rapports IA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-reports
          path: |
            agent/ai-remediation-report.json
            agent/rapport-explicatif.md

      - name: Resume GitHub Actions Summary
        if: always()
        working-directory: agent
        run: |
          echo "## Rapport Agent IA — Zero Trust" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f ai-remediation-report.json ]; then
            echo "Rapport genere avec succes" >> $GITHUB_STEP_SUMMARY
          else
            echo "Rapport non genere" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────
  # JOB 4 : Build Docker
  # ─────────────────────────────────────────
  docker-build:
    name: "4. Build Docker"
    runs-on: ubuntu-latest
    needs: [ai-security-guard]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Sauvegarder image
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} > image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 5 : Scan image Docker
  # ─────────────────────────────────────────
  image-scan:
    name: "5. Scan image Docker"
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger image
        run: docker load < image.tar

      - name: Scanner image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '0'

  # ─────────────────────────────────────────
  # JOB 6 : Signature Cosign (main seulement)
  # ─────────────────────────────────────────
  sign-image:
    name: "6. Signature Cosign"
    runs-on: ubuntu-latest
    needs: [image-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@v3
      - name: Pipeline Zero Trust complet
        run: |
          cosign version
          echo "Pipeline Zero Trust complete — ${{ github.sha }}"