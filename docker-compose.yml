# devsecops-zero-trust-pipeline/docker-compose.yml
version: '3.9'
 
networks:
  zerotrust-net:
    driver: bridge
  ai-internal:
    driver: bridge
    internal: true   # Ollama isolé — pas d'accès internet direct
 
volumes:
  jenkins_home:
  ollama_models:
 
services:
# ─── Jenkins ────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - '9090:8080'
      - '50000:50000'
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc/
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins:/var/jenkins_home/casc:ro
      - ./jenkins/plugins.txt:/usr/share/jenkins/ref/plugins.txt:ro
      - .:/workspace:ro   # Monte ton projet dans Jenkins
    networks:
      - zerotrust-net
      - ai-internal
    depends_on:
      - ollama
 
  # ─── Ollama ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    expose:
      - '11434'   # Port NON exposé publiquement (Zero Trust)
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - ai-internal   # Réseau interne uniquement
      - zerotrust-net
    environment:
      - OLLAMA_HOST=0.0.0.0
